# site properties and page defaults
title: Viral Shah Lab
subtitle: Physiologic Regeneration
description: Viral Shah Lab studies physiologic regeneration
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: viralshahlab@gmail.com
  orcid: 0000-0002-3605-8066
  google-scholar: https://scholar.google.com/citations?hl=en&user=6SISeb8AAAAJ
  pubmed:  https://www.ncbi.nlm.nih.gov/myncbi/viral.shah.2/bibliography/public/
  youtube: playlist?list=PLS-0_ATLgtJraww6TzpFyqgsD2UKpY_wL&si=A8S1cwfkcNn6-DAi

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
